name: Build Zephyr ESP32

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/zephyrproject-rtos/ci:v0.27.4 \
            bash -c '
              pip install west
              west init -l .
              west update
              west zephyr-export

              west build -b esp32_devkitc/esp32/procpu app --pristine 
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-esp32
          path: |
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.elf