name: Build Zephyr Application

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          path: app-repo

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune -a -f

      - name: Build in Docker (Manual Run)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            --user root \
            zephyrprojectrtos/zephyr-build:latest \
            bash -c "
              git config --global --add safe.directory /work/app-repo &&
              west init -l app-repo &&
              west update &&
              west zephyr-export &&
              west build -b esp32_devkitc_wroom/esp32/procpu app-repo/app -p always -- \
              -DZEPHYR_SDK_INSTALL_DIR=/opt/toolchains/zephyr-sdk-1.0.1 \
              -DCHECK_ZEPHYR_SDK_VERSION=OFF
            "

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-heartbeat-binary
          path: |
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.elf